<!doctype html>
<html lang="th" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="PPG Drawing e-Service single page web app" />
    <title>PPG Drawing e-Service</title>
    <link rel="icon" href="./PPG%20Logo%20For%20Web.png" />
    <link rel="stylesheet" href="./assets/css/variables.css" />
    <link rel="stylesheet" href="./assets/css/base.css" />
    <link rel="stylesheet" href="./assets/css/layout.css" />
    <link rel="stylesheet" href="./assets/css/components.css" />
    <link rel="stylesheet" href="./assets/css/responsive.css" />
    <link rel="stylesheet" href="./assets/css/dark-mode.css" />
    <script src="./assets/vendor/msal-browser.min.js"></script>
    <script type="module" src="./assets/js/main.js"></script>
  </head>
  <body>
    <div id="app-shell" class="app-shell">
      <aside class="sidebar" aria-label="Main navigation">
        <a class="brand" href="#/dashboard" aria-label="PPG Drawing e-Service home">
          <img src="./PPG%20Logo%20For%20Web.png" alt="" class="brand-mark" />
          <span>
            <strong>PPG Drawing</strong>
            <small>e-Service</small>
          </span>
        </a>
        <nav id="main-nav" class="nav-list"></nav>
        <div class="sidebar-footer">
          <div class="sidebar-auth">
            <div class="sidebar-user-info">
              <span id="sidebar-user-name" class="sidebar-user-name"></span>
              <span id="user-role-chip" class="user-role-chip"></span>
            </div>
            <button id="login-button" class="secondary-button auth-button" type="button" hidden>เข้าสู่ระบบ</button>
            <small id="sidebar-auth-note" class="sidebar-auth-note" hidden>เฉพาะอีเมล @primepower.co.th เท่านั้น</small>
            <button id="logout-button" class="secondary-button auth-button" type="button" hidden>ออกจากระบบ</button>
          </div>
          <button id="theme-toggle" class="icon-button" type="button" title="Toggle theme" aria-label="Toggle theme">◐</button>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <button id="menu-toggle" class="icon-button menu-toggle" type="button" aria-label="Open menu">☰</button>
          <div class="page-heading">
            <p id="page-kicker">PPG Drawing e-Service</p>
            <h1 id="page-title">ภาพรวมงาน Drawing</h1>
          </div>
        </header>

        <section id="auth-panel" class="notice-panel" hidden>
          <div>
            <h2>เข้าสู่ระบบด้วย Microsoft 365</h2>
            <p>เข้าสู่ระบบเพื่อใช้งาน Microsoft Graph, SharePoint Lists และ workflow อนุมัติเอกสาร Drawing.</p>
            <p class="auth-domain-note">เฉพาะบัญชี @primepower.co.th เท่านั้น</p>
          </div>
          <button id="login-button-panel" class="primary-button microsoft-login-button" type="button">
            <span class="microsoft-mark" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
            <span>เข้าสู่ระบบด้วย Microsoft 365</span>
          </button>
        </section>

        <section id="app-view" class="view" tabindex="-1"></section>
      </main>
    </div>

    <div id="modal-root"></div>
    <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
  </body>
</html>
